<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transporte y Rutas Universitarias</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <h1>Sistema de Transporte y Rutas Universitarias</h1>
        <p>Consulta rutas, horarios y registra nuevas sugerencias</p>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="contenedor-principal">
        <section class="panel-izquierdo">
  
            <section class="filtros">

                <h2>Buscar y Filtrar</h2>

                <label for="buscarDestino">Destino</label>
                <input 
                    type="text" 
                    id="buscarDestino"
                    placeholder="Buscar por destino..."
                >

                <label for="filtroTipo">Tipo</label>
                <select id="filtroTipo">
                    <option value="">Todos los tipos</option>
                    <option value="Normal">Normal</option>
                    <option value="Expreso">Expreso</option>
                </select>

                <button id="btnFiltrar">Aplicar filtros</button>

                <div id="mensajeFiltro"></div>

                <!-- BUSCADOR -->
                <input 
                    type="text" 
                    id="buscarRuta"
                    placeholder="Buscar por destino..."
                >

                <!-- FILTRO -->
                <select id="filtroEstado">
                    <option value="Todos">Todos</option>
                    <option value="Disponible">Disponible</option>
                    <option value="Mantenimiento">Mantenimiento</option>
                </select>

                <!-- ORDENAR -->
                <select id="ordenarRutas">
                    <option value="default">Ordenar</option>
                    <option value="az">A - Z</option>
                    <option value="horario">Por horario</option>
                </select>

            </section>

            <!-- LISTADO DE RUTAS -->
            <section class="listado-rutas">

                <h2>Rutas Universitarias</h2>

                <!-- TARJETAS DINÁMICAS -->
                <div id="contenedorRutas">

                    <!-- JavaScript insertará las tarjetas aquí -->

                </div>

            </section>

        </section>

        <aside class="panel-derecho">

            <!-- FORMULARIO -->
            <section class="formulario">

                <h2>Registrar Nueva Ruta</h2>

                <form id="formRuta">

                    <!-- DESTINO -->
                    <div class="grupo-formulario">
                        <label for="destino">Destino</label>

                        <input 
                            type="text"
                            id="destino"
                            placeholder="Ingrese destino"
                        >
                    </div>

                    <!-- BUS -->
                    <div class="grupo-formulario">
                        <label for="bus">Nombre del Bus</label>

                        <input 
                            type="text"
                            id="bus"
                            placeholder="Ingrese nombre del bus"
                        >
                    </div>

                    <!-- HORARIO -->
                    <div class="grupo-formulario">
                        <label for="horario">Horario</label>

                        <input 
                            type="time"
                            id="horario"
                        >
                    </div>

                    <!-- ESTADO -->
                    <div class="grupo-formulario">
                        <label for="estado">Estado</label>

                        <select id="estado">
                            <option value="Disponible">Disponible</option>
                            <option value="Mantenimiento">Mantenimiento</option>
                        </select>
                    </div>

                    <!-- TIPO -->
                    <div class="grupo-formulario">
                        <label for="tipo">Tipo de Ruta</label>

                        <select id="tipo">
                            <option value="Expreso">Expreso</option>
                            <option value="Normal">Normal</option>
                        </select>
                    </div>

                    <!-- BOTÓN -->
                    <button type="submit" id="btnGuardar">
                        Guardar Ruta
                    </button>

                    <!-- MENSAJES -->
                    <p id="mensaje"></p>

                </form>

            </section>

            <!-- PANEL DETALLE -->
            <section class="detalle-ruta">

                <h2>Detalle de Ruta</h2>

                <div id="detalleRuta">

                    <p>
                        Seleccione una ruta para visualizar su información.
                    </p>

                </div>

            </section>

        </aside>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>Grupo 7 - Transporte y Rutas Universitarias</p>
    </footer>

    <!-- JAVASCRIPT -->
    <script src="js/data.js"></script>
    <script src="js/render.js"></script>
    <script src="js/filtros.js"></script>
    <script src="js/formulario.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
